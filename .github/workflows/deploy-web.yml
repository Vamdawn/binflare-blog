name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - apps/web/**
      - packages/**
      - pnpm-lock.yaml
      - package.json
      - pnpm-workspace.yaml
      - .github/workflows/deploy-web.yml
      - scripts/deploy/**

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_USER: deploy
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_ROOT: /var/www/binflare-blog
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build web
        run: pnpm --filter web build

      - name: Pack dist
        run: |
          ls -la apps/web/dist/
          tar -czf web-dist.tgz -C apps/web/dist .
          ls -la web-dist.tgz

      - name: Generate release id
        run: echo "RELEASE_ID=$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release package and deploy scripts
        run: |
          RELEASE_DIR="$DEPLOY_ROOT/releases/$RELEASE_ID"
          REMOTE_SCRIPT_DIR="$RELEASE_DIR/scripts/deploy"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p \"$DEPLOY_ROOT\" \"$RELEASE_DIR\" \"$REMOTE_SCRIPT_DIR\" \"$DEPLOY_ROOT/shared\" && ls -la \"$DEPLOY_ROOT\""
          scp -v -P "$DEPLOY_PORT" web-dist.tgz "$DEPLOY_USER@$DEPLOY_HOST:$RELEASE_DIR/web-dist.tgz"
          scp -P "$DEPLOY_PORT" scripts/deploy/promote-release.sh "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_SCRIPT_DIR/promote-release.sh"
          scp -P "$DEPLOY_PORT" scripts/deploy/prune-releases.sh "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_SCRIPT_DIR/prune-releases.sh"
          scp -P "$DEPLOY_PORT" scripts/deploy/rollback-release.sh "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_SCRIPT_DIR/rollback-release.sh"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "ls -la \"$RELEASE_DIR/\""

      - name: Extract and promote release
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_ROOT='$DEPLOY_ROOT' RELEASE_ID='$RELEASE_ID' bash -se" <<'EOF'
          set -euo pipefail
          RELEASE_DIR="$DEPLOY_ROOT/releases/$RELEASE_ID"
          REMOTE_SCRIPT_DIR="$RELEASE_DIR/scripts/deploy"
          PREVIOUS_RELEASE_ID=""
          HEALTHCHECK_BASE_URL="http://127.0.0.1"

          if [[ -L "$DEPLOY_ROOT/current" ]]; then
            PREVIOUS_RELEASE_ID="$(basename "$(readlink "$DEPLOY_ROOT/current")")"
          fi

          healthcheck() {
            for path in / /posts/hello-world /404; do
              curl --fail --silent --show-error "$HEALTHCHECK_BASE_URL$path" > /dev/null
            done
          }

          ls -la "$RELEASE_DIR/"
          cd "$RELEASE_DIR"
          tar -xzf web-dist.tgz
          rm -f web-dist.tgz
          chmod +x "$REMOTE_SCRIPT_DIR/promote-release.sh" "$REMOTE_SCRIPT_DIR/prune-releases.sh" "$REMOTE_SCRIPT_DIR/rollback-release.sh"
          bash "$REMOTE_SCRIPT_DIR/promote-release.sh" "$DEPLOY_ROOT" "$RELEASE_ID"

          if healthcheck; then
            bash "$REMOTE_SCRIPT_DIR/prune-releases.sh" "$DEPLOY_ROOT/releases"
            exit 0
          fi

          echo "healthcheck failed after promote, start rollback" >&2
          if [[ -z "$PREVIOUS_RELEASE_ID" ]]; then
            echo "previous release id is empty, skip rollback" >&2
            exit 1
          fi

          bash "$REMOTE_SCRIPT_DIR/rollback-release.sh" "$DEPLOY_ROOT" "$PREVIOUS_RELEASE_ID"
          curl --fail --silent --show-error "$HEALTHCHECK_BASE_URL/" > /dev/null
          exit 1
          EOF
