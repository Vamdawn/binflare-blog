<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle with warm gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9468f"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6c453"/>
      <stop offset="100%" stop-color="#fff8ef"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="url(#bgGrad)"/>

  <!-- Letter B with creative styling -->
  <text
    x="16"
    y="23"
    font-family="Georgia, serif"
    font-size="20"
    font-weight="700"
    text-anchor="middle"
    fill="url(#textGrad)"
  >B</text>
</svg>
